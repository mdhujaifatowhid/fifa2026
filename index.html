<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026 IPTV Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/shaka-player/4.3.5/controls.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">FIFA '26 IPTV</div>
        <nav class="channels-nav" id="channels-container">
            <span class="loading-text">Loading Channels...</span>
        </nav>
    </header>

    <main class="container">
        
        <section class="player-section">
            <div class="player-wrapper" id="video-container">
                <video 
                    id="live-player" 
                    class="shaka-video"
                    autoplay 
                    playsinline>
                </video>
            </div>
            <h2 id="current-channel-title" class="channel-title">Select a Channel</h2>
        </section>

        <section class="fixtures-section">
            <h3 class="section-title">Match Fixtures</h3>
            <div class="fixtures-grid" id="fixtures-container">
                <p class="loading-text">Loading Fixtures...</p>
            </div>
        </section>

    </main>

    <footer class="footer">
        <p>Designed & Developed with ❤️ by <span class="creator-name">Hujaifa.fun</span></p>
    </footer>

    <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoalCast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="bg1"></div>
    <div class="bg2"></div>

    <div class="container">

        <!------------ SIDEBAR ------------>
        <div class="sidebar">
            <div class="logo">
                <div class="ball"></div>
                <h2>GoalCast</h2>
            </div>
            <button class="menu active">All Channels</button>
            <button class="menu">Favourites</button>
            <button class="menu">Live Now</button>
            <button class="menu">Sports</button>

            <div class="promo">
                <h2>FIFA 2026</h2>
                <p>LIVE STREAM</p>
            </div>
        </div>

        <!------------ MAIN ------------>
        <div class="main">
            <div class="hero">
                <p>WATCH LIVE</p>
                <h1>FIFA World Cup 2026</h1>
                <span>Watch football streams in one place.</span>
            </div>

            <input id="search" placeholder="Search channels...">

            <div id="channels" class="grid"></div>
        </div>

        <!------------ PLAYER ------------>
        <div class="player">
            <div class="playerbox">
                <!-- Video Element -->
                <video id="video" controls autoplay></video>
                
                <!-- Frame Element for External Links/Iframes -->
                <div id="frame"></div>
            </div>

            <div class="now">
                <div class="dot"></div>
                <div>LIVE</div>
            </div>

            <h3 id="currentTitle">Select Channel</h3>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
